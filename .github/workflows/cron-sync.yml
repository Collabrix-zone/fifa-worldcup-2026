name: Cron sync (fixtures)

# Periodic fixture sync from football-data.org.
#
# Why this workflow only runs fixtures, not scores:
#   - Scores must poll on the order of minutes during live matches, and
#     GitHub Actions cron drifts to 30-60 min gaps under cluster load.
#     The score sync now runs from an external cron service (cron-job.org)
#     that hits the secret-protected /api/cron/sync-scores webhook
#     reliably every few minutes.
#   - Fixtures take ~100s to sync (33 team lookups + writes) and exceed
#     the Vercel hobby function timeout, so they keep running here in a
#     long-lived job that talks to the database directly.

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch: {}

concurrency:
  group: cron-sync-fixtures
  cancel-in-progress: false

jobs:
  fixtures:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: pnpm sync-fixtures
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FOOTBALL_DATA_API_TOKEN: ${{ secrets.FOOTBALL_DATA_API_TOKEN }}
        run: pnpm --filter @workspace/api-server run sync-fixtures
