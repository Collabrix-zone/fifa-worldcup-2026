databases:
  - name: fifa-worldcup-db
    plan: free
    databaseName: fifa_worldcup
    user: fifa_worldcup

services:
  - type: web
    name: fifa-worldcup
    runtime: node
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @workspace/db run push && PORT=5173 BASE_PATH=/ pnpm --filter @workspace/web run build && pnpm --filter @workspace/api-server run build
    startCommand: STATIC_DIR=$PWD/apps/web/dist/public pnpm --filter @workspace/api-server run start
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: fifa-worldcup-db
          property: connectionString
      - key: APP_BASE_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM
        value: Football Kickoff 2026 <noreply@send.thecollabrix.com>
      - key: FOOTBALL_DATA_API_TOKEN
        sync: false
      - key: LOG_LEVEL
        value: info
